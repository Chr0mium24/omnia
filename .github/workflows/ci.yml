name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  release:
    types: [published]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test -- --coverage
      - run: npm run build

  release:
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    needs: check
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Package extension
        run: |
          mkdir -p dist/omnia-extension
          cp -r extension/dist extension/icons extension/manifest.json extension/popup.html dist/omnia-extension/
      - name: Create extension zip
        run: |
          cd dist
          zip -r omnia-extension.zip omnia-extension
          cd ..
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/omnia-extension.zip
          fail_on_unmatched_files: true
